<meta charset="UTF-8">

<title>Skill Cleanup Map — 2026-07-01</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #e6edf3;
    --green: #238636;
    --green-text: #3fb950;
    --orange: #9e4711;
    --orange-text: #f0883e;
    --blue: #1158c7;
    --blue-text: #58a6ff;
    --gray: #2d333b;
    --gray-text: #8b949e;
    --red: #da3633;
    --accent: #388bfd;
    --cluster-bg: #13161a;
    --new-badge: #5a3e00;
    --new-text: #ffa657;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 4px;
  }
  .header .meta { color: var(--text-dim); font-size: 12px; margin-bottom: 14px; }
  .archive-note {
    background: #1a1a2e;
    border: 1px solid #3b3b5c;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #9399b0;
    margin-bottom: 14px;
  }
  .archive-note strong { color: #b0b8d8; }

  /* SUMMARY BAR */
  .summary-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }
  .sum-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
  }
  .sum-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .sum-chip.total { border-color: var(--accent); color: var(--text-bright); }
  .sum-chip.keep .dot { background: var(--green-text); }
  .sum-chip.keep { color: var(--green-text); }
  .sum-chip.overlap .dot { background: var(--orange-text); }
  .sum-chip.overlap { color: var(--orange-text); }
  .sum-chip.family .dot { background: var(--blue-text); }
  .sum-chip.family { color: var(--blue-text); }
  .sum-chip.review .dot { background: var(--gray-text); }
  .sum-chip.review { color: var(--gray-text); }

  /* FILTER */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filter-bar input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 12px;
    font-size: 13px;
    width: 280px;
    outline: none;
    transition: border-color 0.15s;
  }
  .filter-bar input:focus { border-color: var(--accent); }
  .filter-bar input::placeholder { color: var(--text-dim); }
  .filter-count { color: var(--text-dim); font-size: 12px; }

  /* MAIN */
  .main { padding: 24px 32px 60px; max-width: 1400px; }

  /* SECTION */
  .section { margin-bottom: 36px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-header h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .section-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .section-toggle {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    padding: 2px 8px;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .section-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* CLUSTER */
  .cluster {
    margin-bottom: 20px;
    background: var(--cluster-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .cluster-header {
    background: var(--surface2);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* SKILL TABLE */
  .skill-table {
    width: 100%;
    border-collapse: collapse;
  }
  .skill-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .skill-table td {
    padding: 9px 12px;
    border-bottom: 1px solid #1c2128;
    vertical-align: top;
  }
  .skill-table tr:last-child td { border-bottom: none; }
  .skill-table tr:hover td { background: rgba(88, 166, 255, 0.03); }
  .skill-table tr.hidden { display: none; }

  /* VERDICT BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-keep { background: rgba(35, 134, 54, 0.2); color: var(--green-text); border: 1px solid rgba(63, 185, 80, 0.3); }
  .badge-overlap { background: rgba(158, 71, 17, 0.2); color: var(--orange-text); border: 1px solid rgba(240, 136, 62, 0.3); }
  .badge-family { background: rgba(17, 88, 199, 0.2); color: var(--blue-text); border: 1px solid rgba(88, 166, 255, 0.3); }
  .badge-review { background: rgba(45, 51, 59, 0.5); color: var(--gray-text); border: 1px solid #3d444d; }
  .badge-new { background: rgba(90, 62, 0, 0.4); color: var(--new-text); border: 1px solid rgba(255, 166, 87, 0.3); font-size: 10px; margin-left: 4px; }

  /* AGENT PILL */
  .agent-pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 500;
  }
  .agent-claude { background: rgba(255, 150, 100, 0.15); color: #ff9664; border: 1px solid rgba(255, 150, 100, 0.25); }
  .agent-codex { background: rgba(100, 200, 255, 0.12); color: #64c8ff; border: 1px solid rgba(100, 200, 255, 0.22); }
  .agent-both { background: rgba(150, 100, 255, 0.15); color: #b88fff; border: 1px solid rgba(150, 100, 255, 0.25); }

  /* NAME */
  .skill-name {
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-bright);
    white-space: nowrap;
  }

  /* PURPOSE */
  .skill-purpose {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.4;
    max-width: 380px;
  }

  /* RECOMMENDATION */
  .recommendation {
    font-size: 11px;
    color: #c07850;
    font-style: italic;
    margin-top: 3px;
  }

  /* DATE */
  .skill-date {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .skill-date.stale { color: #7d4a3a; }
  .skill-date.recent { color: #3fb950; }

  /* SIZE */
  .skill-size {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: monospace;
  }

  /* CLUSTER TAG */
  .cluster-tag {
    font-size: 10px;
    color: #6e7681;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    white-space: nowrap;
  }

  /* COLLAPSIBLE */
  .collapsible-body { transition: none; }
  .collapsible-body.collapsed { display: none; }
</style>

// ============================================================
// CLASSIFICATION HELPERS
// ============================================================
function verdictLabel(v) {
  const map = {keep:"🟢 KEEP", overlap:"🟠 OVERLAP", family:"🔵 FAMILY", review:"⚪ REVIEW"};
  return map[v] || v;
}
function badgeClass(v) {
  return {keep:"badge-keep", overlap:"badge-overlap", family:"badge-family", review:"badge-review"}[v] || "";
}
function agentPill(a) {
  if (a === "both") return `<span class="agent-pill agent-both">claude + codex</span>`;
  if (a === "claude") return `<span class="agent-pill agent-claude">claude</span>`;
  if (a === "codex") return `<span class="agent-pill agent-codex">codex</span>`;
  return a;
}
function dateClass(d) {
  const dt = new Date(d);
  const now = new Date("2026-07-01");
  const daysDiff = (now - dt) / 86400000;
  if (daysDiff < 30) return "recent";
  if (daysDiff > 365) return "stale";
  return "";
}
function fmtSize(n) {
  if (n > 1024) return (n/1024).toFixed(1) + "k";
  return n + "b";
}

// ============================================================
// COUNT PER VERDICT
// ============================================================
const counts = {keep:0, overlap:0, family:0, review:0};
SKILLS.forEach(s => { if (counts[s.verdict] !== undefined) counts[s.verdict]++; });

// Summary bar
const summaryBar = document.getElementById("summaryBar");
summaryBar.innerHTML = `
  <div class="sum-chip total">Total: ${SKILLS.length} skills</div>
  <div class="sum-chip keep"><span class="dot"></span>${counts.keep} KEEP</div>
  <div class="sum-chip overlap"><span class="dot"></span>${counts.overlap} OVERLAP</div>
  <div class="sum-chip review"><span class="dot"></span>${counts.review} REVIEW</div>
  <div class="sum-chip family"><span class="dot"></span>${counts.family} FAMILY</div>
`;

// ============================================================
// BUILD TABLE ROWS
// ============================================================
function makeRow(s) {
  const newBadge = s.isNew ? `<span class="badge badge-new">built 2026-07</span>` : "";
  const clusterTag = s.cluster ? `<span class="cluster-tag">${s.cluster}</span>` : "";
  const rec = s.rec ? `<div class="recommendation">&#x2192; ${s.rec}</div>` : "";
  return `<tr class="skill-row"
    data-name="${s.name.toLowerCase()}"
    data-desc="${(s.desc||"").toLowerCase()}"
    data-cluster="${(s.cluster||"").toLowerCase()}"
    data-verdict="${s.verdict}">
    <td><span class="skill-name">${s.name}</span>${newBadge}</td>
    <td><span class="badge ${badgeClass(s.verdict)}">${verdictLabel(s.verdict)}</span></td>
    <td>${clusterTag}</td>
    <td>${agentPill(s.agents)}</td>
    <td class="skill-date ${dateClass(s.lastmod)}">${s.lastmod}</td>
    <td class="skill-size">${fmtSize(s.size)}</td>
    <td class="skill-purpose">${s.desc || '<span style="color:#444">—</span>'}${rec}</td>
  </tr>`;
}

function makeTable(skills) {
  return `<table class="skill-table">
    <thead><tr>
      <th>Name</th><th>Verdict</th><th>Cluster</th><th>Agents</th><th>Last Modified</th><th>Size</th><th>Purpose / Recommendation</th>
    </tr></thead>
    <tbody>${skills.map(makeRow).join("")}</tbody>
  </table>`;
}

// ============================================================
// SECTION BUILDERS
// ============================================================
const main = document.getElementById("main");

// --- OVERLAP SECTION ---
function buildOverlapSection() {
  const clusters = {};
  SKILLS.filter(s => s.verdict === "overlap").forEach(s => {
    const c = s.cluster || "other";
    if (!clusters[c]) clusters[c] = [];
    clusters[c].push(s);
  });

  let html = `<div class="section" data-section="overlap">
    <div class="section-header">
      <h2>🟠 OVERLAP — Redundancy Clusters</h2>
      <span class="section-count">${counts.overlap} skills</span>
    </div>`;

  const clusterLabels = {
    "skill-creation": "Skill Creation (skill-creator is canonical)",
    "brainstorm": "Brainstorming (exact duplicate found)",
    "ui-design": "UI / Design (overlapping scope — taste call)",
    "autoresearch": "Autoresearch (claude + codex variants)",
    "other": "Other"
  };

  for (const [cname, skills] of Object.entries(clusters)) {
    html += `<div class="cluster">
      <div class="cluster-header">Cluster: ${clusterLabels[cname] || cname}</div>
      ${makeTable(skills)}
    </div>`;
  }
  html += `</div>`;
  return html;
}

// --- FAMILY SECTION (collapsed by default) ---

  let html = `<div class="section" data-section="family">

// --- KEEP SECTION ---
function buildKeepSection() {
  const skills = SKILLS.filter(s => s.verdict === "keep").sort((a,b) => a.name.localeCompare(b.name));
  return `<div class="section" data-section="keep">
    <div class="section-header">
      <h2>🟢 KEEP — Distinct, Useful</h2>
      <span class="section-count">${skills.length} skills</span>
      <button class="section-toggle" onclick="toggleSection(this)">Collapse</button>
    </div>
    <div class="collapsible-body" id="keep-body">
      <div class="cluster">${makeTable(skills)}</div>
    </div>
  </div>`;
}

main.innerHTML = buildOverlapSection() + buildReviewSection() + buildFamilySection() + buildKeepSection();

// ============================================================
// TOGGLE
// ============================================================
function toggleSection(btn) {
  const body = btn.closest(".section").querySelector(".collapsible-body");
  const collapsed = body.classList.toggle("collapsed");
  btn.textContent = collapsed ? "Expand" : "Collapse";
}

// ============================================================
// FILTER
// ============================================================
let allRows = null;
function applyFilter() {
  if (!allRows) allRows = Array.from(document.querySelectorAll(".skill-row"));
  const q = document.getElementById("filterBox").value.trim().toLowerCase();
  let shown = 0;
  allRows.forEach(row => {
    const match = !q
      || row.dataset.name.includes(q)
      || row.dataset.desc.includes(q)
      || row.dataset.cluster.includes(q)
      || row.dataset.verdict.includes(q);
    row.classList.toggle("hidden", !match);
    if (match) shown++;

    // Expand collapsed sections when filter is active
    if (q) {
      const body = row.closest(".collapsible-body");
      if (body && match) body.classList.remove("collapsed");
    }
  });
  document.getElementById("filterCount").textContent = q ? `${shown} of ${allRows.length} shown` : "";
}
