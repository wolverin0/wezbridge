</style></head><body><h1>Skill Keep-List</h1><div class="sub">Checked = KEEP ON. Unchecked = archived. Local skills only (plugins excluded, they are managed). Default: all checked, so anything you skip stays kept.</div><div class="bar"><input type="text" id="f" placeholder="filter by name / purpose / badge..."><button onclick="setAll(true)">Check all</button><button onclick="setAll(false)">Uncheck all</button><button onclick="uncheckBadge('overlap')">Uncheck OVERLAP</button><button onclick="uncheckBadge('review')">Uncheck REVIEW</button><span class="count"><b id="kc">0</b> keep / <b id="tc">0</b> total (<b id="ac" style="color:#d29922">0</b> to archive)</span><button class="primary" onclick="exportKeep()">Export KEEP list</button></div><table><thead><tr><th>keep</th><th>skill</th><th>badge</th><th>agents</th><th>date</th><th>purpose</th></tr></thead><tbody id="tb"></tbody></table><script>const DATA=[{"folder": "agent-skill-creator", "name": "agent-skill-creator", "mismatch": false, "agents": ["claude"], "badge": "keep", "desc": "Create cross-platform agent skills from workflow descriptions. Activates when users ask to create an agent, automate a repetitive workflow, create a custom skill, or need advanced agent creation. Triggers on phrases like create agent for, automate workflow, create skill for, every day I have to, daily I need to, turn process into agent, need to automate, create a cross-platform skill, validate thi", "size": 28076, "date": "2026-03-22"}, {"folder": "all-plan", "name": "all-plan", "mismatch": false, "agents": ["codex"], "badge": "keep", "desc": "Collaborative planning using abstract roles (designer + inspiration + reviewer).", "size": 646, "date": "2026-03-23"}, {"folder": "ask", "name": "ask", "mismatch": false, "agents": ["codex"], "badge": "keep", "desc": "Send the user's request to specified AI provider asynchronously", "size": 1208, "date": "2026-03-23"}, {"folder": "audit-blind-spots", "name": "audit-blind-spots", "mismatch": false, "age
