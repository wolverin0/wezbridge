<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WezBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-app: oklch(0.10 0.015 270);
  --bg-surface: oklch(0.15 0.015 270);
  --bg-elevated: oklch(0.18 0.015 270);
  --bg-hover: oklch(0.21 0.015 270);
  --accent: oklch(0.65 0.24 270);
  --green: oklch(0.75 0.18 155);
  --red: oklch(0.65 0.22 25);
  --yellow: oklch(0.80 0.18 85);
  --cyan: oklch(0.78 0.15 195);
  --text-primary: oklch(0.95 0.01 260);
  --text-secondary: oklch(0.72 0.015 260);
  --text-tertiary: oklch(0.50 0.015 260);
  --border: oklch(0.25 0.012 270);
  --glass: rgba(23, 23, 23, 0.92);
  --glass-border: rgba(255, 255, 255, 0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg-app); color:var(--text-primary); overflow:hidden; height:100vh; user-select:none; }
code,pre,.mono { font-family:'JetBrains Mono',monospace; }

/* ─── Top Bar ─── */
.topbar {
  height:32px; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; background:rgba(0,0,0,0.5); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border); z-index:9999; position:relative;
  font-size:12px; font-weight:500;
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.topbar-brand { font-weight:700; letter-spacing:-0.5px; font-size:13px; }
.topbar-brand span { color:var(--accent); }
.topbar-menu { display:flex; gap:2px; }
.topbar-menu button { background:none; border:none; color:var(--text-secondary); font-size:11px; font-weight:600; padding:3px 10px; border-radius:4px; cursor:pointer; font-family:inherit; }
.topbar-menu button:hover { background:rgba(255,255,255,0.08); color:var(--text-primary); }
.topbar-right { display:flex; align-items:center; gap:12px; font-size:11px; color:var(--text-secondary); }
.topbar-stat { display:flex; align-items:center; gap:3px; }
.topbar-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.topbar-dot.g { background:var(--green); }
.topbar-dot.y { background:var(--yellow); }
.topbar-dot.r { background:var(--red); }
.topbar-time { font-weight:600; color:var(--text-primary); }

/* ─── Desktop ─── */
.desktop { position:relative; width:100%; height:calc(100vh - 32px - 56px); overflow:hidden; }

/* ─── Window ─── */
.window {
  position:absolute; min-width:380px; min-height:250px;
  background:var(--glass); backdrop-filter:blur(25px);
  border:1px solid var(--glass-border); border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  display:flex; flex-direction:column; overflow:hidden;
  transition:box-shadow 0.2s;
}
.window.active { box-shadow:0 16px 60px rgba(0,0,0,0.6); border-color:rgba(255,255,255,0.12); }
.window.maximized { border-radius:0; }
.window.minimized { display:none; }

.win-header {
  height:38px; display:flex; align-items:center; padding:0 12px; gap:10px;
  background:rgba(0,0,0,0.25); border-bottom:1px solid var(--glass-border);
  cursor:grab; flex-shrink:0;
}
.win-header:active { cursor:grabbing; }
.win-dots { display:flex; gap:6px; }
.win-dots span { width:12px; height:12px; border-radius:50%; cursor:pointer; transition:filter 0.15s; }
.win-dots span:hover { filter:brightness(1.4); }
.win-dots .wd-close { background:#ff5f57; }
.win-dots .wd-min { background:#febc2e; }
.win-dots .wd-max { background:#28c840; }
.win-title { font-size:12px; font-weight:600; color:var(--text-secondary); flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.win-status { font-size:10px; font-weight:700; text-transform:uppercase; padding:2px 6px; border-radius:4px; letter-spacing:0.3px; }
.win-status.idle { background:rgba(34,197,94,0.15); color:var(--green); }
.win-status.working { background:rgba(245,158,11,0.15); color:var(--yellow); }
.win-status.permission { background:rgba(239,68,68,0.15); color:var(--red); }
.win-status.unknown { background:rgba(100,100,120,0.15); color:var(--text-tertiary); }

.win-body { flex:1; overflow:auto; padding:10px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; line-height:1.55; color:oklch(0.76 0.01 260); white-space:pre-wrap; word-break:break-word; background:oklch(0.07 0.012 270); }
.win-body::-webkit-scrollbar { width:5px; }
.win-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.win-prompt { display:flex; gap:6px; padding:8px 10px; border-top:1px solid var(--glass-border); background:rgba(0,0,0,0.15); }
.win-prompt input { flex:1; background:var(--bg-app); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:11px; color:var(--text-primary); font-family:'JetBrains Mono',monospace; outline:none; }
.win-prompt input:focus { border-color:var(--accent); }
.win-prompt button { font-family:'Inter',sans-serif; font-size:11px; font-weight:600; padding:5px 12px; border-radius:6px; border:none; cursor:pointer; background:var(--accent); color:#fff; }
.win-prompt .btn-yes { background:var(--green); color:#000; }
.win-prompt .btn-no { background:transparent; color:var(--red); border:1px solid var(--red); }

/* Resize handles */
.win-resize { position:absolute; z-index:2; }
.win-resize.n { top:-3px; left:10px; right:10px; height:6px; cursor:n-resize; }
.win-resize.s { bottom:-3px; left:10px; right:10px; height:6px; cursor:s-resize; }
.win-resize.e { right:-3px; top:10px; bottom:10px; width:6px; cursor:e-resize; }
.win-resize.w { left:-3px; top:10px; bottom:10px; width:6px; cursor:w-resize; }
.win-resize.ne { top:-3px; right:-3px; width:12px; height:12px; cursor:ne-resize; }
.win-resize.nw { top:-3px; left:-3px; width:12px; height:12px; cursor:nw-resize; }
.win-resize.se { bottom:-3px; right:-3px; width:12px; height:12px; cursor:se-resize; }
.win-resize.sw { bottom:-3px; left:-3px; width:12px; height:12px; cursor:sw-resize; }

/* ─── Dock ─── */
.dock {
  position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; padding:6px 12px; background:rgba(0,0,0,0.5);
  backdrop-filter:blur(20px); border:1px solid var(--glass-border);
  border-radius:16px; z-index:9998;
}
.dock-item {
  width:44px; height:44px; border-radius:10px; display:flex; align-items:center;
  justify-content:center; cursor:pointer; transition:all 0.2s; position:relative;
  font-size:11px; font-weight:700; color:var(--text-primary);
}
.dock-item:hover { transform:translateY(-4px) scale(1.1); }
.dock-item.idle { background:rgba(34,197,94,0.2); border:1px solid rgba(34,197,94,0.3); }
.dock-item.working { background:rgba(245,158,11,0.2); border:1px solid rgba(245,158,11,0.3); }
.dock-item.permission { background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.3); }
.dock-item.unknown { background:rgba(100,100,120,0.2); border:1px solid rgba(100,100,120,0.3); }
.dock-item .dock-dot { position:absolute; bottom:-2px; width:5px; height:5px; border-radius:50%; background:var(--text-primary); }
.dock-item .dock-label { position:absolute; bottom:-18px; font-size:9px; white-space:nowrap; color:var(--text-secondary); font-weight:500; pointer-events:none; opacity:0; transition:opacity 0.2s; }
.dock-item:hover .dock-label { opacity:1; }
.dock-add { background:rgba(255,255,255,0.05); border:1px dashed rgba(255,255,255,0.15); color:var(--accent); font-size:18px; font-weight:400; }

/* ─── Feed notification ─── */
.feed-notif {
  position:fixed; top:40px; right:12px; z-index:10000; max-width:360px;
  background:var(--bg-elevated); border:1px solid var(--green); border-radius:10px;
  padding:10px 14px; box-shadow:0 8px 30px rgba(0,0,0,0.5); animation:notifIn 0.3s;
  cursor:pointer; font-size:12px;
}
.feed-notif.perm { border-color:var(--red); }
@keyframes notifIn { from { opacity:0; transform:translateY(-8px); } }
.feed-notif-title { font-weight:700; margin-bottom:2px; }
.feed-notif-body { color:var(--text-secondary); font-size:11px; max-height:60px; overflow:hidden; }

/* ─── Toast ─── */
.toast { position:fixed; bottom:72px; right:16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:8px; padding:8px 16px; font-size:12px; z-index:10000; animation:notifIn 0.3s; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">Wez<span>Bridge</span></div>
    <div class="topbar-menu">
      <button onclick="tileWindows()">Tile</button>
      <button onclick="cascadeWindows()">Cascade</button>
      <button onclick="stackWindows()">Stack</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="topbar-stat"><span class="topbar-dot g"></span><span id="topIdle">0</span></div>
    <div class="topbar-stat"><span class="topbar-dot y"></span><span id="topWork">0</span></div>
    <div class="topbar-stat"><span class="topbar-dot r"></span><span id="topPerm">0</span></div>
    <span class="topbar-time" id="clock"></span>
  </div>
</div>

<div class="desktop" id="desktop"></div>

<div class="dock" id="dock"></div>

<script>
var API = '';
var stripAnsi = function(s) { return s.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, ''); };
var esc = function(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
var sessions = [];
var windows = {};  // paneId -> { el, x, y, w, h, maximized, minimized, zIndex }
var topZ = 10;
var activeWinId = null;
var TOPBAR_H = 32;
var DOCK_H = 56;

// Clock
function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
tick(); setInterval(tick, 10000);

// ─── Fetch sessions ───
function refresh() {
  fetch(API + '/api/sessions').then(function(r){ return r.json(); }).then(function(data) {
    sessions = (data.sessions || []).filter(function(s){ return s.is_claude; });
    updateTopStats();
    syncWindows();
    renderDock();
  }).catch(function(){});
}

function updateTopStats() {
  document.getElementById('topIdle').textContent = sessions.filter(function(s){ return s.status==='idle'; }).length;
  document.getElementById('topWork').textContent = sessions.filter(function(s){ return s.status==='working'; }).length;
  document.getElementById('topPerm').textContent = sessions.filter(function(s){ return s.status==='permission'; }).length;
}

// ─── Window management ───
function syncWindows() {
  var desktop = document.getElementById('desktop');
  var dw = desktop.offsetWidth;
  var dh = desktop.offsetHeight;
  var existingIds = {};

  sessions.forEach(function(s, i) {
    existingIds[s.pane_id] = true;
    if (!windows[s.pane_id]) {
      // Create new window
      var cols = Math.ceil(Math.sqrt(sessions.length));
      var ww = Math.max(400, Math.floor(dw / cols) - 20);
      var wh = Math.max(280, Math.floor(dh / Math.ceil(sessions.length / cols)) - 20);
      var col = i % cols;
      var row = Math.floor(i / cols);
      windows[s.pane_id] = {
        x: 10 + col * (ww + 10), y: 10 + row * (wh + 10),
        w: ww, h: wh, maximized: false, minimized: false, zIndex: topZ++
      };
      createWindowEl(s);
    }
    updateWindowContent(s);
  });

  // Remove windows for gone sessions
  Object.keys(windows).forEach(function(id) {
    if (!existingIds[id]) {
      var el = document.getElementById('win-' + id);
      if (el) el.remove();
      delete windows[id];
    }
  });
}

function createWindowEl(s) {
  var desktop = document.getElementById('desktop');
  var win = windows[s.pane_id];
  var el = document.createElement('div');
  el.className = 'window';
  el.id = 'win-' + s.pane_id;
  el.style.left = win.x + 'px';
  el.style.top = win.y + 'px';
  el.style.width = win.w + 'px';
  el.style.height = win.h + 'px';
  el.style.zIndex = win.zIndex;

  el.innerHTML =
    '<div class="win-header" data-pane="' + s.pane_id + '">' +
      '<div class="win-dots">' +
        '<span class="wd-close" onclick="closeWindow(' + s.pane_id + ')"></span>' +
        '<span class="wd-min" onclick="minimizeWindow(' + s.pane_id + ')"></span>' +
        '<span class="wd-max" onclick="maximizeWindow(' + s.pane_id + ')"></span>' +
      '</div>' +
      '<span class="win-title">' + esc(s.project_name || 'pane ' + s.pane_id) + '</span>' +
      '<span class="win-status ' + s.status + '" id="wst-' + s.pane_id + '">' + s.status + '</span>' +
    '</div>' +
    '<div class="win-body" id="wbody-' + s.pane_id + '">Loading...</div>' +
    '<div class="win-prompt" id="wprompt-' + s.pane_id + '">' +
      '<input placeholder="Send prompt..." onkeydown="if(event.key===\'Enter\')sendWinPrompt(' + s.pane_id + ',this)">' +
      '<button onclick="sendWinPrompt(' + s.pane_id + ',this.previousElementSibling)">Send</button>' +
    '</div>' +
    '<div class="win-resize n" data-dir="n"></div>' +
    '<div class="win-resize s" data-dir="s"></div>' +
    '<div class="win-resize e" data-dir="e"></div>' +
    '<div class="win-resize w" data-dir="w"></div>' +
    '<div class="win-resize ne" data-dir="ne"></div>' +
    '<div class="win-resize nw" data-dir="nw"></div>' +
    '<div class="win-resize se" data-dir="se"></div>' +
    '<div class="win-resize sw" data-dir="sw"></div>';

  el.addEventListener('mousedown', function(e) {
    if (!e.target.classList.contains('win-resize')) focusWindow(s.pane_id);
  });

  // Drag
  var header = el.querySelector('.win-header');
  header.addEventListener('mousedown', function(e) {
    if (e.target.closest('.win-dots')) return;
    startDrag(s.pane_id, e);
  });

  // Resize
  el.querySelectorAll('.win-resize').forEach(function(handle) {
    handle.addEventListener('mousedown', function(e) {
      startResize(s.pane_id, e, handle.dataset.dir);
    });
  });

  desktop.appendChild(el);
  loadWindowOutput(s.pane_id);
}

function updateWindowContent(s) {
  var st = document.getElementById('wst-' + s.pane_id);
  if (st) { st.textContent = s.status; st.className = 'win-status ' + s.status; }

  // Update prompt bar based on status
  var prompt = document.getElementById('wprompt-' + s.pane_id);
  if (prompt && s.status === 'permission') {
    prompt.innerHTML =
      '<button class="btn-yes" onclick="sendWinKey(' + s.pane_id + ',\'y\')">Approve (y)</button>' +
      '<button class="btn-no" onclick="sendWinKey(' + s.pane_id + ',\'n\')">Deny (n)</button>' +
      '<input placeholder="Send prompt..." style="flex:1" onkeydown="if(event.key===\'Enter\')sendWinPrompt(' + s.pane_id + ',this)">' +
      '<button onclick="sendWinPrompt(' + s.pane_id + ',this.previousElementSibling)">Send</button>';
  }
}

function loadWindowOutput(paneId) {
  fetch(API + '/api/sessions/' + paneId + '/output?lines=100').then(function(r){ return r.json(); }).then(function(data) {
    var body = document.getElementById('wbody-' + paneId);
    if (!body) return;
    var text = stripAnsi(data.output || '(empty)');
    var wasBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 50;
    body.textContent = text;
    if (wasBottom) body.scrollTop = body.scrollHeight;
  }).catch(function(){});
}

// Refresh all outputs every 3s
setInterval(function() {
  Object.keys(windows).forEach(function(id) { loadWindowOutput(parseInt(id)); });
}, 3000);

// ─── Window actions ───
function focusWindow(paneId) {
  activeWinId = paneId;
  windows[paneId].zIndex = ++topZ;
  var el = document.getElementById('win-' + paneId);
  if (el) { el.style.zIndex = topZ; el.classList.add('active'); }
  document.querySelectorAll('.window').forEach(function(w) {
    if (w.id !== 'win-' + paneId) w.classList.remove('active');
  });
}

function closeWindow(paneId) {
  var el = document.getElementById('win-' + paneId);
  if (el) { el.classList.add('minimized'); windows[paneId].minimized = true; }
}

function minimizeWindow(paneId) {
  var el = document.getElementById('win-' + paneId);
  if (el) { el.classList.add('minimized'); windows[paneId].minimized = true; }
}

function maximizeWindow(paneId) {
  var win = windows[paneId];
  var el = document.getElementById('win-' + paneId);
  if (!el) return;
  var desktop = document.getElementById('desktop');
  if (win.maximized) {
    el.style.left = win._restoreX + 'px'; el.style.top = win._restoreY + 'px';
    el.style.width = win._restoreW + 'px'; el.style.height = win._restoreH + 'px';
    el.classList.remove('maximized');
    win.maximized = false;
  } else {
    win._restoreX = win.x; win._restoreY = win.y; win._restoreW = win.w; win._restoreH = win.h;
    el.style.left = '0'; el.style.top = '0';
    el.style.width = desktop.offsetWidth + 'px'; el.style.height = desktop.offsetHeight + 'px';
    el.classList.add('maximized');
    win.maximized = true;
  }
  focusWindow(paneId);
}

function restoreWindow(paneId) {
  var el = document.getElementById('win-' + paneId);
  if (el) { el.classList.remove('minimized'); windows[paneId].minimized = false; focusWindow(paneId); }
}

// ─── Drag ───
function startDrag(paneId, e) {
  if (windows[paneId].maximized) return;
  e.preventDefault();
  var win = windows[paneId];
  var el = document.getElementById('win-' + paneId);
  var sx = e.clientX - win.x, sy = e.clientY - win.y;
  focusWindow(paneId);

  function onMove(e2) {
    win.x = e2.clientX - sx; win.y = e2.clientY - sy;
    el.style.left = win.x + 'px'; el.style.top = win.y + 'px';
  }
  function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ─── Resize ───
function startResize(paneId, e, dir) {
  if (windows[paneId].maximized) return;
  e.preventDefault(); e.stopPropagation();
  var win = windows[paneId];
  var el = document.getElementById('win-' + paneId);
  var sx = e.clientX, sy = e.clientY;
  var ow = win.w, oh = win.h, ox = win.x, oy = win.y;
  focusWindow(paneId);

  function onMove(e2) {
    var dx = e2.clientX - sx, dy = e2.clientY - sy;
    var nw = ow, nh = oh, nx = ox, ny = oy;
    if (dir.includes('e')) nw = Math.max(380, ow + dx);
    if (dir.includes('w')) { nw = Math.max(380, ow - dx); nx = ox + (ow - nw); }
    if (dir.includes('s')) nh = Math.max(250, oh + dy);
    if (dir.includes('n')) { nh = Math.max(250, oh - dy); ny = oy + (oh - nh); }
    win.w = nw; win.h = nh; win.x = nx; win.y = ny;
    el.style.width = nw + 'px'; el.style.height = nh + 'px';
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
  }
  function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ─── Layout modes ───
function tileWindows() {
  var desktop = document.getElementById('desktop');
  var dw = desktop.offsetWidth, dh = desktop.offsetHeight;
  var visible = Object.keys(windows).filter(function(id) { return !windows[id].minimized; });
  if (!visible.length) return;
  var cols = Math.ceil(Math.sqrt(visible.length));
  var rows = Math.ceil(visible.length / cols);
  var ww = Math.floor(dw / cols) - 8;
  var wh = Math.floor(dh / rows) - 8;
  visible.forEach(function(id, i) {
    var win = windows[id];
    var el = document.getElementById('win-' + id);
    var col = i % cols, row = Math.floor(i / cols);
    win.x = 4 + col * (ww + 8); win.y = 4 + row * (wh + 8); win.w = ww; win.h = wh;
    win.maximized = false;
    el.classList.remove('maximized');
    el.style.left = win.x + 'px'; el.style.top = win.y + 'px';
    el.style.width = win.w + 'px'; el.style.height = win.h + 'px';
  });
}

function cascadeWindows() {
  var visible = Object.keys(windows).filter(function(id) { return !windows[id].minimized; });
  visible.forEach(function(id, i) {
    var win = windows[id];
    var el = document.getElementById('win-' + id);
    win.x = 30 + i * 30; win.y = 10 + i * 30; win.w = 600; win.h = 400;
    win.maximized = false; win.zIndex = 10 + i;
    el.classList.remove('maximized');
    el.style.left = win.x + 'px'; el.style.top = win.y + 'px';
    el.style.width = win.w + 'px'; el.style.height = win.h + 'px';
    el.style.zIndex = win.zIndex;
  });
  topZ = 10 + visible.length;
}

function stackWindows() {
  var desktop = document.getElementById('desktop');
  var dw = desktop.offsetWidth, dh = desktop.offsetHeight;
  var visible = Object.keys(windows).filter(function(id) { return !windows[id].minimized; });
  var ww = Math.min(700, dw - 40), wh = Math.min(500, dh - 40);
  var cx = (dw - ww) / 2, cy = (dh - wh) / 2;
  visible.forEach(function(id, i) {
    var win = windows[id];
    var el = document.getElementById('win-' + id);
    win.x = cx; win.y = cy; win.w = ww; win.h = wh;
    win.maximized = false; win.zIndex = 10 + i;
    el.classList.remove('maximized');
    el.style.left = win.x + 'px'; el.style.top = win.y + 'px';
    el.style.width = win.w + 'px'; el.style.height = win.h + 'px';
    el.style.zIndex = win.zIndex;
  });
  topZ = 10 + visible.length;
}

// ─── Dock ───
function renderDock() {
  var dock = document.getElementById('dock');
  var html = '';
  sessions.forEach(function(s) {
    var initials = (s.project_name || 'P').slice(0, 2).toUpperCase();
    var isOpen = windows[s.pane_id] && !windows[s.pane_id].minimized;
    html += '<div class="dock-item ' + s.status + '" onclick="' + (isOpen ? 'focusWindow(' + s.pane_id + ')' : 'restoreWindow(' + s.pane_id + ')') + '">' +
      initials +
      (isOpen ? '<span class="dock-dot"></span>' : '') +
      '<span class="dock-label">' + esc(s.project_name || 'pane ' + s.pane_id) + '</span>' +
    '</div>';
  });
  html += '<div class="dock-item dock-add" onclick="openSpawnPrompt()">+</div>';
  dock.innerHTML = html;
}

// ─── Actions ───
function sendWinPrompt(paneId, input) {
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  fetch(API + '/api/sessions/' + paneId + '/prompt', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({text: text})
  }).then(function() { toast('Sent to pane ' + paneId); setTimeout(function(){ loadWindowOutput(paneId); }, 1000); });
}

function sendWinKey(paneId, key) {
  fetch(API + '/api/sessions/' + paneId + '/key', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({key: key})
  }).then(function() { toast(key + ' sent'); });
}

function openSpawnPrompt() {
  var path = prompt('Project path to spawn Claude in:');
  if (!path) return;
  fetch(API + '/api/spawn', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({cwd: path})
  }).then(function() { toast('Spawning...'); setTimeout(refresh, 4000); });
}

// ─── SSE for live notifications ───
function connectSSE() {
  var sse = new EventSource(API + '/api/events');
  sse.onmessage = function(e) {
    try {
      var event = JSON.parse(e.data);
      if (event.type === 'completed' || event.type === 'permission') {
        showNotif(event);
        playSound(event.type);
      }
      refresh();
    } catch(ex) {}
  };
  sse.onerror = function() { setTimeout(connectSSE, 5000); };
}

function showNotif(event) {
  var old = document.querySelector('.feed-notif');
  if (old) old.remove();
  var el = document.createElement('div');
  el.className = 'feed-notif' + (event.type === 'permission' ? ' perm' : '');
  var title = event.type === 'completed' ? event.project + ' finished' : event.project + ' needs permission';
  var body = event.output ? stripAnsi(event.output).split('\n').slice(-3).join('\n') : '';
  el.innerHTML = '<div class="feed-notif-title">' + esc(title) + '</div><div class="feed-notif-body">' + esc(body).slice(0, 200) + '</div>';
  el.onclick = function() { el.remove(); if (windows[event.pane_id]) { restoreWindow(event.pane_id); focusWindow(event.pane_id); } };
  document.body.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.remove(); }, 8000);

  if (Notification.permission === 'granted') {
    new Notification('WezBridge: ' + title, {body: body.slice(0, 100)});
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

function playSound(type) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = type === 'completed' ? 880 : 440;
    gain.gain.value = 0.08;
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch(ex) {}
}

function toast(msg) {
  var el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el); setTimeout(function() { el.remove(); }, 3000);
}

// ─── Init ───
refresh();
setInterval(refresh, 3000);
connectSSE();
document.addEventListener('click', function() { if (Notification.permission === 'default') Notification.requestPermission(); }, {once:true});

// Right-click context menu
document.getElementById('desktop').addEventListener('contextmenu', function(e) {
  e.preventDefault();
  var menu = document.createElement('div');
  menu.style.cssText = 'position:fixed;left:' + e.clientX + 'px;top:' + e.clientY + 'px;background:var(--bg-elevated);border:1px solid var(--glass-border);border-radius:8px;padding:4px 0;z-index:99999;min-width:140px;backdrop-filter:blur(20px);font-size:12px;';
  ['Tile', 'Cascade', 'Stack'].forEach(function(label) {
    var item = document.createElement('div');
    item.textContent = label;
    item.style.cssText = 'padding:6px 14px;cursor:pointer;color:var(--text-primary);';
    item.onmouseenter = function() { item.style.background = 'rgba(255,255,255,0.08)'; };
    item.onmouseleave = function() { item.style.background = 'none'; };
    item.onclick = function() { menu.remove(); window[label.toLowerCase() + 'Windows'](); };
    menu.appendChild(item);
  });
  document.body.appendChild(menu);
  setTimeout(function() { document.addEventListener('click', function rm() { menu.remove(); document.removeEventListener('click', rm); }); }, 10);
});
</script>
